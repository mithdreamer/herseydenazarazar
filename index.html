<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Teknoloji konularını kısa ve başlangıç seviyesinde anlatan bilgi bankası.">
  <title>Her Şeyden Azar Azar</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="components/navbar/navbar.css">
  <link rel="stylesheet" href="components/footer/footer.css">
</head>
<body>
  <div data-component="navbar" data-root="." data-current="home"></div>

  <header class="hero">
    <div class="hero__content">
      <p class="eyebrow">Başlangıç seviyesi teknoloji bilgi bankası</p>
      <h1>Her Şeyden Azar Azar</h1>
      <p>Web geliştirme, yazılım, yapay zeka, ağ, donanım ve bulut kavramlarını kısa kartlarla keşfet.</p>
    </div>
  </header>

  <main class="container">
    <section class="search-panel" aria-labelledby="category-search-title">
      <div>
        <h2 id="category-search-title">Kategorilerde Ara</h2>
        <p id="category-search-status" aria-live="polite">Kategoriler yükleniyor.</p>
      </div>
      <label class="search-panel__field" for="category-search">
        <span>Arama</span>
        <input id="category-search" type="search" placeholder="Kategori veya terim ara" autocomplete="off">
      </label>
    </section>

    <p class="search-empty" id="category-search-empty" hidden>Aramanızla eşleşen kategori bulunamadı.</p>
    <div id="category-sections" class="category-sections" aria-live="polite"></div>
  </main>

  <dialog class="topic-modal" id="topic-modal" aria-labelledby="topic-modal-title">
    <div class="topic-modal__panel">
      <button class="topic-modal__close" type="button" aria-label="Modalı kapat" data-modal-close>&times;</button>
      <h2 id="topic-modal-title"></h2>
      <div class="topic-modal__content" id="topic-modal-content"></div>
    </div>
  </dialog>

  <div data-component="footer" data-root="."></div>

  <script src="components/navbar/navbar.js"></script>
  <script src="components/footer/footer.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
